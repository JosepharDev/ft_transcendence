<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body 
        {
            background: rgb(209, 53, 53);
        }
        .settings-container {
            margin-top: 50px;
            margin-bottom: 20px;
            max-width: 400px; /* Reduced width */
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #caacac;
        }
        .settings-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group label {
            font-weight: 500;
        }
        .profile-image-preview {
            display: block;
            margin: 10px auto;
            width: 80px; /* Smaller width */
            height: 80px; /* Smaller height */
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }
        .two-factor-auth {
            margin-top: 20px;
            text-align: center;
        }
        .two-factor-auth img {
            display: block;
            margin: 10px auto;
            width: 200px; /* Adjust width if needed */
            height: 200px; /* Adjust width if needed */
        }
    </style>
</head>
<body>
    <div class="container settings-container">
        <h2 class="settings-title">Profile Settings</h2>
        <form id="profile-form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="profile-image">Profile Image</label>
                <input type="file" class="form-control-file" id="profile-image" accept="image/*">
                <img id="profile-image-preview" class="profile-image-preview" src="#" alt="Profile Image Preview" style="display: none;">
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter new username">
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter new email">
            </div>
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter new password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update Profile</button>
        </form>
        <div class="two-factor-auth">
            <button id="toggle-2fa-btn" class="btn btn-secondary btn-block">Enable 2FA</button>
            <img id="2fa-image" src="https://pbs.twimg.com/profile_images/1701878932176351232/AlNU3WTK_400x400.jpg" alt="2FA QR Code" style="display: none;">
            <input type="text" id="2fa-code" class="form-control mt-2" placeholder="Enter 2FA code" style="display: none;">
            <button id="submit-2fa-btn" class="btn btn-success btn-block mt-2" style="display: none;">Submit 2FA Code</button>
        </div>
    </div>

    <script>
        // document.getElementById('profile-image').addEventListener('change', function(event) {
        //     const file = event.target.files[0];
        //     if (file) {
        //         const reader = new FileReader();
        //         reader.onload = function(e) {
        //             const preview = document.getElementById('profile-image-preview');
        //             preview.src = e.target.result;
        //             preview.style.display = 'block';
        //         };
        //         reader.readAsDataURL(file);
        //     }
        // });

        document.getElementById('profile-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const profileImage = document.getElementById('profile-image').files[0];

            // Basic validation
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            // Prepare form data
            const formData = new FormData();
            formData.append('username', username);
            formData.append('email', email);
            formData.append('password', password);
            if (profileImage) {
                formData.append('profileImage', profileImage);
            }

            // Mock update function
            console.log('Updating profile with the following info:');
            console.log('Username:', username);
            console.log('Email:', email);
            console.log('Password:', password);
            if (profileImage) {
                console.log('Profile Image:', profileImage.name);
            }

            // Add code to update the profile on the server
            // Example: send formData to the server using fetch API or XMLHttpRequest
            alert('Profile updated successfully!');
        });

        document.getElementById('toggle-2fa-btn').addEventListener('click', function() {
            const image = document.getElementById('2fa-image');
            const input = document.getElementById('2fa-code');
            const button = document.getElementById('toggle-2fa-btn');
            const submitButton = document.getElementById('submit-2fa-btn');

            if (image.style.display === 'none') {
                // Enable 2FA
                image.style.display = 'block';
                input.style.display = 'block';
                submitButton.style.display = 'block';
                button.textContent = 'Disable 2FA';
            } else {
                // Disable 2FA
                image.style.display = 'none';
                input.style.display = 'none';
                submitButton.style.display = 'none';
                button.textContent = 'Enable 2FA';
            }
        });

        document.getElementById('submit-2fa-btn').addEventListener('click', function() {
            const code = document.getElementById('2fa-code').value;
            if (!code) {
                alert('Please enter the 2FA code.');
                return;
            }

            // Mock submit 2FA code
            console.log('Submitting 2FA code:', code);

            // Add code to submit the 2FA code to the server
            // Example: send the code to the server using fetch API or XMLHttpRequest
            alert('2FA code submitted successfully!');
        });
    </script>
</body>
</html>
