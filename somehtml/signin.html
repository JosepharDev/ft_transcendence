<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body
        {
            background: rgba(40,40,40,255);

        }
        .signin {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: rgba(40,40,40,255);
            font-family: Arial, sans-serif;
        }
        .form-container {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(73,73,73,255);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .form-header {
            background-color: rgba(0, 0, 0, 0);
            border: 1px solid rgba(73,73,73,255);
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }
        .btn-primary {
            background-color: rgba(0, 0, 0, 0);
            border: 2px solid rgba(212,155,32,255);
        }
        .btn-primary:hover {
            background-color: rgba(212,155,32,255);
            border: 2px solid rgba(212,155,32,255);
        }
        #mybtn:active, #mybtn:focus, #mybtn:focus:active {
            background-color: rgba(212,155,32,255);
            border: 2px solid rgba(212,155,32,255);
            color: white;
            box-shadow: none;
        }
        .btn-ftwo {
            background-color: #3b5998;
            color: white;
            border: none;
        }
        .btn-ftwo:hover {
            background-color: #2d4373;
        }
    </style>
</head>
<body>
    <div class="signin">
        <div class="form-container">
            <div class="form-header">
                <h2>Sign In</h2>
            </div>
            <form id="signinForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password">
                </div>
                <button id="mybtn" type="button" class="btn btn-primary btn-block" onclick="signIn()">Sign In</button>
                <button type="button" class="btn btn-ftwo btn-block" onclick="signInWithFacebook()">Sign in with 42</button>
            </form>
        </div>
    </div>

    <script>
        function signIn() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }

            // Handle sign in logic here
            alert('Signed in as ' + username);
        }

        function signInWithFacebook() {
            // Handle Facebook sign in logic here
            alert('Signed in with Facebook');
        }
    </script>
</body>
</html>
