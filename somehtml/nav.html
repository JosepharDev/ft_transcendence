<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Custom Navbar</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand.left {
            position: absolute;
            left: 10px;
        }
        .navbar-nav.center {
            margin: auto;
        }
        .avatar {
            position: absolute;
            right: 10px;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand left" href="#">Logout</a>
        
        <div class="navbar-nav center">
            <li class="nav-item">
                <a class="nav-link" href="#">Home</a>
            </li>
        </div>
        
        <div class="avatar">
            <img src="https://i.ytimg.com/vi/ha0-qytMD9k/maxresdefault.jpg" alt="Avatar" class="rounded-circle" width="50" height="50">
            <!-- <img src="avatar.png" alt="Avatar" class="rounded-circle" width="50" height="50"> -->
        </div>
    </nav>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
