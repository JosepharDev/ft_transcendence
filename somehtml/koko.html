<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Cards</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8d7da; /* Red background color */
        }
        .card {
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
            margin-right: 10px;
            width: 150px; /* Smaller width for cards */
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card-body {
            background-color: #ffffff; /* White background for card body */
            padding: 20px;
            text-align: center;
        }
        .card-container {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 20px; /* Add some padding to the bottom to avoid hiding the scrollbar */
            padding-top: 20px; /* Add some padding to the top */
        }
        .scroll-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            cursor: pointer;
        }
        .scroll-arrow-left {
            left: 10px;
        }
        .scroll-arrow-right {
            right: 10px;
        }
        .navbar {
            background-color: #dc3545 !important; /* Red background color for navbar */
        }
        .navbar-brand {
            margin-right: auto;
            margin-left: auto;
        }
        .navbar-nav {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="#">
            Home
        </a>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" href="#">Logout</a>
            </li>
        </ul>
        <img src="https://via.placeholder.com/30" alt="Profile Image" class="mr-2">
    </nav>

    <div class="container mt-5 position-relative">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-container">
                    <div class="scroll-arrow scroll-arrow-left" onclick="scrollLeft()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M5 12l9 8V4zm2 0l7 8V4z"/><path fill="none" d="M0 0h24v24H0z"/></svg>
                    </div>
                    <div class="card mr-3" onclick="selectOption('friends')" style="background-color: #4caf50;"> <!-- Green background for friends -->
                        <div class="card-body">
                            <h5 class="card-title">Friends</h5>
                            <p class="card-text">Connect with friends</p>
                        </div>
                    </div>
                    <div class="card mr-3" onclick="selectOption('game-local')" style="background-color: #2196f3;"> <!-- Blue background for game local -->
                        <div class="card-body">
                            <h5 class="card-title">Game Local</h5>
                            <p class="card-text">Play a game locally</p>
                        </div>
                    </div>
                    <div class="card mr-3" onclick="selectOption('remote-1vs1')" style="background-color: #ff5722;"> <!-- Orange background for remote 1vs1 -->
                        <div class="card-body">
                            <h5 class="card-title">Remote 1vs1</h5>
                            <p class="card-text">Play remotely with a friend</p>
                        </div>
                    </div>
                    <div class="card mr-3" onclick="selectOption('remote-2vs2')" style="background-color: #9c27b0;"> <!-- Purple background for remote 2vs2 -->
                        <div class="card-body">
                            <h5 class="card-title">Remote 2vs2</h5>
                            <p class="card-text">Play remotely in teams</p>
                        </div>
                    </div>
                    <div class="card mr-3" onclick="selectOption('training')" style="background-color: #ff9800;"> <!-- Orange background for training -->
                        <div class="card-body">
                            <h5 class="card-title">Training</h5>
                            <p class="card-text">Practice and improve your skills</p>
                        </div>
                    </div>
                    <div class="card mr-3" onclick="selectOption('tournament')" style="background-color: #e91e63;"> <!-- Pink background for tournament -->
                        <div class="card-body">
                            <h5 class="card-title">Tournament</h5>
                            <p class="card-text">Compete in a tournament</p>
                        </div>
                    </div>
                    <div class="card" onclick="selectOption('search')" style="background-color: #ffeb3b;"> <!-- Yellow background for search -->
                        <div class="card-body">
                            <h5 class="card-title">Search</h5>
                            <p class="card-text">Search for opponents</p>
                        </div>
                    </div>
                    <div class="scroll-arrow scroll-arrow-right" onclick="scrollRight()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M14 12l-9 8V4zm-2 0l-7 8V4z"/><path fill="none" d="M0 0h24v24H0z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectOption(option) {
            alert("You selected: " + option);
            // You can perform further actions based on the selected option
        }

        function scrollLeft() {
            document.querySelector('.card-container').scrollBy({
                left: -220, // Scroll 220 pixels to the left
                behavior: 'smooth'
            });
        }

        function scrollRight() {
            document.querySelector('.card-container').scrollBy({
                left: 220, // Scroll 220 pixels to the right
                behavior
                : 'smooth'
            });
        }
    </script>

</body>
</html>
