<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search</title>
    <!-- <link href="./static/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <style>
        body 
        {
            background: rgb(209, 53, 53);
        }
        .search-container {
            margin-top: 50px;
            max-width: 400px; /* Adjusted width */
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            text-align: center;
        }
        .search-results {
            margin-top: 20px;
            max-height: 220px; /* Adjusted maximum height */
            overflow-y: auto; /* Added overflow for vertical scrolling */
            padding-right: 5px; /* Added right padding to prevent overlap with scrollbar */
        }
        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            background-color: #fff;
        }
        .user-item img {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }
        .user-item span {
            font-size: 16px;
            font-weight: 500;
        }
        .not-found {
            font-size: 18px;
            color: red;
            margin-top: 20px;
        }
        .btn-search
        {
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container search-container">
        <h2>User Search</h2>
        <form id="search-form">
            <div class="form-group">
                <input type="text" class="form-control" id="search-input" placeholder="Search for users by username">
            </div>
            <button type="submit" class="btn-search btn btn-primary btn-block">Search</button>
        </form>
        <div id="search-results" class="search-results"></div>
    </div>

    <script>
        const users = [
            { username: 'JohnDoe', profileImage: 'https://via.placeholder.com/50' },
            { username: 'JaneSmith', profileImage: 'https://via.placeholder.com/50' },
            { username: 'AliceBrown', profileImage: 'https://via.placeholder.com/50' },
            { username: 'BobWhite', profileImage: 'https://via.placeholder.com/50' },
            { username: 'User1', profileImage: 'https://via.placeholder.com/50' },
            { username: 'User2', profileImage: 'https://via.placeholder.com/50' },
            { username: 'User3', profileImage: 'https://via.placeholder.com/50' },
            { username: 'User4', profileImage: 'https://via.placeholder.com/50' }
        ];

        // document.getElementById('search-form').addEventListener('submit', function(event) {
        //     event.preventDefault();
        //     const query = document.getElementById('search-input').value.trim().toLowerCase();
        //     const resultsContainer = document.getElementById('search-results');
        //     resultsContainer.innerHTML = '';

        //     const filteredUsers = users.filter(user => user.username.toLowerCase().includes(query));

        //     if (filteredUsers.length > 0) {
        //         filteredUsers.slice(0, 4).forEach(user => {
        //             const userItem = document.createElement('div');
        //             userItem.classList.add('user-item');
        //             userItem.innerHTML = `
        //                 <img src="${user.profileImage}" alt="${user.username} Profile Image">
        //                 <span>${user.username}</span>
        //             `;
        //             resultsContainer.appendChild(userItem);
        //         });
        //     } else {
        //         resultsContainer.innerHTML = '<div class="not-found">No users found</div>';
        //     }
        // });


        document.getElementById('search-form').addEventListener('submit', function(event) {
            event.preventDefault();
            // const query = document.getElementById('search-input').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = '';

            const filteredUsers = users

            if (filteredUsers.length > 0) {
                filteredUsers.forEach(user => {
                    const userItem = document.createElement('div');
                    userItem.classList.add('user-item');
                    userItem.innerHTML = `
                        <img src="${user.profileImage}" alt="${user.username} Profile Image">
                        <span>${user.username}</span>
                    `;
                    resultsContainer.appendChild(userItem);
                });
            } else {
                resultsContainer.innerHTML = '<div class="not-found">No users found</div>';
            }
        });
    </script>
</body>
</html>
