<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Registration</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }
        .form-container, .matches-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .form-header, .matches-header {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .match {
            margin: 10px 0;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
            text-align: center;
        }
        .btn-back {
            margin-top: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="form-container" id="formContainer">
        <div class="form-header">
            <h2>Tournament Registration</h2>
        </div>
        <form id="tournamentForm">
            <div class="form-group">
                <label for="player1">Player 1</label>
                <input type="text" class="form-control" id="player1" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="player2">Player 2</label>
                <input type="text" class="form-control" id="player2" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="player3">Player 3</label>
                <input type="text" class="form-control" id="player3" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="player4">Player 4</label>
                <input type="text" class="form-control" id="player4" placeholder="Enter username">
            </div>
            <button type="button" class="btn btn-primary btn-block" onclick="startTournament()">Submit</button>
        </form>
    </div>

    <div class="matches-container d-none" id="matchesContainer">
        <div class="matches-header">
            <h2>Upcoming Matches</h2>
        </div>
        <div id="matchmaking"></div>
        <button class="btn btn-primary btn-back" onclick="showForm()">Back to Registration</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function startTournament() {
            const player1 = document.getElementById('player1').value;
            const player2 = document.getElementById('player2').value;
            const player3 = document.getElementById('player3').value;
            const player4 = document.getElementById('player4').value;

            if (!player1 || !player2 || !player3 || !player4) {
                alert('Please enter all player usernames');
                return;
            }

            const players = [player1, player2, player3, player4];
            const matches = [
                `${players[0]} vs ${players[1]}`,
                `${players[2]} vs ${players[3]}`,
            ];

            let matchmakingDiv = document.getElementById('matchmaking');
            matchmakingDiv.innerHTML = '';

            matches.forEach((match, index) => {
                let matchDiv = document.createElement('div');
                matchDiv.className = 'match';
                matchDiv.textContent = `${match}`;
                matchmakingDiv.appendChild(matchDiv);
            });

            document.getElementById('formContainer').classList.add('d-none');
            document.getElementById('matchesContainer').classList.remove('d-none');
        }

        function showForm() {
            document.getElementById('formContainer').classList.remove('d-none');
            document.getElementById('matchesContainer').classList.add('d-none');
        }
    </script>
</body>
</html>
