<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <!-- <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"> -->
    <link href="./../static/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .navbar {
            margin-bottom: 10px;
        }
        .navbar-brand.left {
            position: absolute;
            left: 10px;
        }
        .navbar-nav.center {
            margin: auto;
        }
        .avatar {
            position: absolute;
            right: 10px;
            width: 50px;
            height: 50px;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 56px); /* Adjust based on navbar height */
        }
        canvas {
            background: #000;
            display: block;
            margin: 20px auto;
            border: 2px solid #fff;
        }
        #game-info {
            text-align: center;
            width: 100%;
            color: #333;
            margin-bottom: 10px;
            /* background-color: #ffffff; */
            padding: 10px;
            /* border-radius: 8px; */
            /* box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); */
        }
        #game-info h2 {
            font-size: 2em;
            margin-bottom: 5px;
            color: #ff6600;
            text-transform: uppercase;
            /* letter-spacing: 1px; */
        }
        #game-info p {
            font-size: 1.2em;
            color: #555;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand left" href="#">Logout</a>
        <div class="navbar-nav center">
            <li class="nav-item">
                <a class="nav-link" href="#">Home</a>
            </li>
        </div>
        <div class="avatar">
            <img src="https://i.ytimg.com/vi/ha0-qytMD9k/maxresdefault.jpg" alt="Avatar" class="rounded-circle" width="50" height="50">
        </div>
    </nav>

    <div id="game-container">
        <div id="game-info">
            <h2>player1 vs player2</h2>
            <!-- <p>Score: <span id="score">0 - 0</span></p> -->
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
    </div>


      
    <script>

        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "20px Arial";
            ctx.fillText(text, x, y);
        }

        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 800;// window.innerWidth;
        canvas.height = 400;//window.innerHeight;
    
    
        let flag = 1;
    
        const keyPressed = [];
        const KEY_UP = 87;
        const KEY_DOWN = 83;
        
        const KEY_UP_RIGHT = 38;
        const KEY_DOWN_RIGHT  = 40;
        window.addEventListener("keydown", (e) => {
          console.log(e.keyCode);
          keyPressed[e.keyCode] = true;
        })
        window.addEventListener("keyup", (e) => {
          // console.log(e.keyCode);
          keyPressed[e.keyCode] = false;
        })
    
    
        function vec2(x, y)
        {
          return {x: x, y : y};
        }
    
        function Ball(pos , velocity, radius)
        {
          this.pos = pos;
          this.velocity = velocity;
          this.radius = radius;
    
          this.update = function ()
          {
            this.pos.x += this.velocity.x;
            this.pos.y += this.velocity.y;
          };
    
          this.draw = function ()
          {
            ctx.fillStyle = "white";
            // ctx.strokeStyle =  "#33ff00";
            ctx.beginPath ();
            ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            // ctx.stroke();
          };
    
    
        }
    
        function Paddle(pos , velocity, width, height, jj)
        {
          this.s = jj;
          this.pos = pos;
          this.velocity = velocity;
          this.width = width;
          this.height = height;
          this.score = 0;
          this.update = function (){
            if (this.s === 1)
            {
              if (keyPressed[KEY_UP])
              this.pos.y -= this.velocity.y;
              if (keyPressed[KEY_DOWN])
                this.pos.y += this.velocity.y;
            }
            else
            {
              if (keyPressed[KEY_UP_RIGHT])
                this.pos.y -= this.velocity.y;
              if (keyPressed[KEY_DOWN_RIGHT])
                this.pos.y += this.velocity.y;
            }
    
          }
    
          this.draw = function () {
            ctx.fillStyle  = "white";
            ctx.fillRect (this.pos.x, this.pos.y - 13, this.width, this.height + 13);
          }
    
          
          this.getHalfWidth = function ()
          {
            return this.width / 2;
          };
    
          this.getHalfHeight = function ()  { return this.height / 2};
    
    
          this.getCenter = function (){
            return vec2(this.pos.x + this.getHalfWidth(), this.pos.y + this.getHalfHeight());
          }
        }
    
    
        function paddleCollisionWithEdges(paddle)
        {
          if (paddle.pos.y < 0)
            paddle.pos.y = 0;
          if (paddle.pos.y + paddle.height > canvas.height)
            paddle.pos.y = canvas.height - paddle.height;
        }
        
    
        function ballCollisionWithEdges(ball)
        {
          if (ball.pos.y + ball.radius >= canvas.height || ball.pos.y - ball.radius <= 0 )
            ball.velocity.y *= -1;
    
          // if (ball.pos.x + ball.radius >= canvas.width || ball.pos.x - ball.radius <= 0)
          //   ball.velocity.x *= -1;
        }
    
    
        function ballPaddleCollision(ball, paddle)
        {
          let dx = Math.abs(ball.pos.x - paddle.getCenter().x);
          let dy = Math.abs(ball.pos.y - paddle.getCenter().y);
    
          if (dx < (ball.radius + paddle.getHalfWidth()) && dy < (paddle.getHalfHeight() + ball.radius))
          {
            if (paddle.s === 1)
              ball.pos.x = (paddle.pos.x + paddle.width) + ball.radius;  // if ball gets stuck
            else
              ball.pos.x = paddle.pos.x - paddle.width - ball.radius; // if ball gets stuck
            // ball.pos.y = (Math.random() * (canvas.height - 200));
            ball.velocity.x *= -1;
            let angle = (Math.random() * 2 - 1) * Math.PI / 4; // Random angle between -45 and 45 degrees
            ball.velocity.y += Math.sin(angle);
          }
        }
    
    
        function player2ai (ball, paddle) {
          // paddle.pos
          if (ball.velocity.x > 0)
          {
              if (ball.pos.y > paddle.pos.y)
              {
                paddle.pos.y += paddle.velocity.y;
    
                if (paddle.pos.y + paddle.height >= canvas.height)
                  paddle.pos.y = canvas.height - paddle.height;
              }
    
    
              if (ball.pos.y < paddle.pos.y)
              {
                paddle.pos.y -= paddle.velocity.y;
    
                if (paddle.pos.y < 0)
                  paddle.pos.y = 0;
              }
          }
        }
    
        function respawnBall(ball)
        {
          if (ball.velocity.x > 0)
          {
              ball.pos.x = canvas.width - 150;
              ball.pos.y = (Math.random() * (canvas.height - 200)) + 100;
          }
          if (ball.velocity.x < 0)
          {
              ball.pos.x = 150;
              ball.pos.y = (Math.random() * (canvas.height - 200)) + 100;
          }
          ball.velocity.x *= -1;
          ball.velocity.y *= -1;
        }
    
        function increaseScore(ball, paddle_1, paddle_2)
        {
          if (ball.pos.x <= -ball.radius)
          {
            paddle_2.score += 1;
            // document.getElementById("player2").innerHTML = paddle_2.score;
            respawnBall(ball)
          }
          if (ball.pos.x >= canvas.width + ball.radius)
          {
            paddle_1.score += 1;
            // document.getElementById("player1").innerHTML = paddle_1.score;
            respawnBall(ball)
          }
        }
    
        function drawSceneGame()
        {
          ctx.strokeStyle = "#FFF";
    
          // ctx.beginPath();
          // ctx.lineWidth = 20;
          // ctx.moveTo(0,0);
          // ctx.lineTo(canvas.width, 0 );
          // ctx.stroke();
    
    
          // ctx.beginPath();
          // ctx.lineWidth = 20;
          // ctx.moveTo(0,canvas.height);
          // ctx.lineTo(canvas.width, canvas.height );
          // ctx.stroke();
    
          // ctx.beginPath();
          // ctx.lineWidth = 10;
          // ctx.moveTo(canvas.width,0);
          // ctx.lineTo(canvas.width, canvas.height );
          // ctx.stroke();
    
          // ctx.beginPath();
          // ctx.lineWidth = 10;
          // ctx.moveTo(0, 0);
          // ctx.lineTo(0, canvas.height );
          // ctx.stroke();
    
          ctx.beginPath();
          ctx.lineWidth = 3;
          ctx.moveTo(canvas.width/2, 0);
          ctx.lineTo(canvas.width/2, canvas.height );
          ctx.stroke();
    
          // ctx.beginPath();
          // ctx.arc(canvas.width/2, canvas.height / 2, 50, 0, Math.PI * 2);
          // ctx.lineWidth = 5;
          // ctx.stroke();
    
        }
    
        const ball = new Ball (vec2(20,20), vec2(16, 16), 10);
        const paddle1 = new Paddle(vec2(0,70), vec2(10,10), 10 ,100,1);
        const paddle2 = new Paddle(vec2(canvas.width - 10, 20), vec2(10,10), 10 ,100,2);
    
        
        flag = 1;
        function gameUpdate() {
          ball.update();
          paddle1.update();
          paddleCollisionWithEdges(paddle1);
          if (!flag)
          player2ai(ball, paddle2);
          else
           paddle2.update();
          paddleCollisionWithEdges(paddle2);
    
          ballCollisionWithEdges(ball);
        
          ballPaddleCollision(ball, paddle1);
          ballPaddleCollision(ball, paddle2);
          increaseScore(ball, paddle1, paddle2)
          drawText(paddle1.score, canvas.width / 4, 50, "#FFF"); // Draw team1 score
          drawText(paddle2.score, 3 * canvas.width / 4, 50, "#FFF"); // Draw team2 score
        }
        
        function gameDraw() {
          ball.draw();
          paddle1.draw();
          paddle2.draw();
          drawSceneGame();
        }
        function gameLoop()
        {
    
          // ctx.clearRect(0, 0 , canvas.width, canvas.height);
          ctx.fillStyle = "rgba(0,0,0,1)"
          ctx.fillRect(0,0,canvas.width, canvas.height);
          window.requestAnimationFrame(gameLoop);
    
          gameUpdate();
          gameDraw();
        
          
        
        }
    
        gameLoop();
    
      </script>
</body>
</html>
