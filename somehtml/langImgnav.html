<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile and Match History</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .profile-section {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .username-display {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .follow-button {
            margin-bottom: 10px;
        }
        .online-status {
            margin-bottom: 10px;
        }
        .stats {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .stat-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 5px;
            margin: 5px;
            color: white;
        }
        .wins {
            background-color: #28a745; /* Green background for wins */
        }
        .losses {
            background-color: #dc3545; /* Red background for losses */
        }
        .matches {
            background-color: #ffc107; /* Yellow background for matches */
        }
        .match-history {
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .match-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            background-color: #69ebae; /* Light blue background color */
            max-width: 800px; /* Set maximum width for background */
            margin-left: auto; /* Center the background */
            margin-right: auto; /* Center the background */
        }
        .player-image {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }
        .username {
            font-size: 18px;
            font-weight: 500;
            margin-right: 15px;
        }
        .score {
            font-size: 18px;
            font-weight: 700;
            margin-right: 15px;
        }
        .vs {
            font-size: 16px;
            margin-right: 15px;
        }

        .empty-history {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            color: #6c757d;
        }


        
    </style>
</head>
<body>
    <div class="container profile-section">
        
    </div>

    <div class="container match-history">
        <h2 class="mb-4 text-center">Match History</h2>
        <div id="matchHistoryContainer">
            <!-- Match items will be here -->
        </div>
        <div class="empty-history" id="emptyHistoryMessage" style="display: none;">
            No match history available.
        </div>
        
        <!-- Add more match items as needed -->
    </div>

    <!-- <script src="https://kit.fontawesome.com/a076d05399.js"></script> -->
    <!-- <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script> -->
    <script>
        userData = {
            username : 'zakaria',
            img : "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
            isFriend : true,
            isonline : false,
            wins : 10,
            loses : 5,
            matches : 15,

            matchesData : [
                {
                    firstPlayerimg: "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
                    secondPlayerimg: "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
                    firstPlayerName : "jojo",
                    firstPlayerscore : "6",
                    secondPlayerName : "momo",
                    secondPlayerscore : "1",
                },
                {
                    firstPlayerimg: "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
                    secondPlayerimg: "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
                    firstPlayerName : "jojo",
                    firstPlayerscore : "6",
                    secondPlayerName : "momo",
                    secondPlayerscore : "1",
                },
                {
                    firstPlayerimg: "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
                    secondPlayerimg: "https://facts.net/wp-content/uploads/2023/05/Naruto.jpeg",
                    firstPlayerName : "jojo",
                    firstPlayerscore : "6",
                    secondPlayerName : "momo",
                    secondPlayerscore : "1",
                },
            ]
        };

        document.querySelector(".profile-section").innerHTML = profileFirstPartView(userData);
        historyMatchView(userData.matchesData);
        
        
        function profileFirstPartView(data)
        {
            let flw = data.isFriend ? "Follow" : "Unfollow";
            online = data.online ? "Online" : "Offline";
            badge = data.online ? "badge-success" : "badge-danger";
            return (
                `
                <img src="${data.img}" alt="Profile Image" class="profile-image">
                <div class="username-display">${data.username}</div> <!-- Added username display -->
                <div>
                    <button class="btn btn-primary follow-button">${flw}</button>
                </div>
                <div class="online-status">
                    <span class="badge ${badge}">${online}</span>
                    <!-- Use 'badge-danger' for offline status -->
                </div>
                <div class="stats">
                    <div class="stat-item wins">
                        <p>Wins: ${data.wins}</p>
                    </div>
                    <div class="stat-item losses">
                        <p>Losses: ${data.loses}</p>
                    </div>
                    <div class="stat-item matches">
                        <p>Matches: ${data.matches}</p>
                    </div>
                </div>`
            )
        }

        function historyMatchView(data)
        {
            hi = document.querySelector("#matchHistoryContainer");
            const emptyHistoryMessage = document.getElementById('emptyHistoryMessage');
            if (data.length > 0)
            {
                emptyHistoryMessage.style.display = 'none';
                data.forEach(element => {
                    let newDiv = document.createElement('div');
                    newDiv.innerHTML = historyMatchViewHelper(element);
                    newDiv.className = "match-item";
                    hi.appendChild(newDiv);
                });
            }
            else
            {
                emptyHistoryMessage.style.display = 'block';
            }
        }
        function historyMatchViewHelper(data)
        {
            return (
                `<img src="${data.firstPlayerimg}" alt="Player 1 Image" class="player-image">
                <span class="username">${data.firstPlayerName}</span>
                <span class="score">${data.firstPlayerscore}</span>
                <span class="vs">vs</span>
                <span class="score">${data.firstPlayerscore}</span>
                <span class="username">${data.secondPlayerName}</span>
                <img src="${data.secondPlayerimg}" alt="Player 2 Image" class="player-image">`
            );
        }

    </script>
</body>
</html>
