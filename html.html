    <script>
        // JavaScript to toggle online/offline status
        document.querySelector('.status-text').addEventListener('click', function() {
            const statusIndicator = document.querySelector('.status-indicator');
            const statusText = document.querySelector('.status-text');

            if (statusText.textContent === 'Online') {
                statusIndicator.classList.add('offline');
                statusText.textContent = 'Offline';
            } else {
                statusIndicator.classList.remove('offline');
                statusText.textContent = 'Online';
            }
        });

        // JavaScript to toggle follow/unfollow status
        document.querySelector('.follow-btn').addEventListener('click', function() {
            const followBtn = document.querySelector('.follow-btn');

            if (followBtn.textContent === 'Follow') {
                followBtn.textContent = 'Unfollow';
                followBtn.classList.remove('btn-outline-light');
                followBtn.classList.add('btn-light');
            } else {
                followBtn.textContent = 'Follow';
                followBtn.classList.remove('btn-light');
                followBtn.classList.add('btn-outline-light');
            }
        });
    </script>
