<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <link href="/static/css/bootstrap.min.css"  rel="stylesheet">
    <link href="/static/css/stackboots.css"  rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bangers&family=Orbitron:wght@400;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script defer src="/static/spajs/app.js" type="module"></script>
    <style>
        #navi {
            max-width: 700px;
            border: 1px solid rgba(212,155,32,1);
            border-radius: 15px;
            background-color: rgba(0, 0, 0, 255);
            color: white;
            margin: 0 auto;
            margin-top: 10px;
            padding: 10px 20px;
        }

        #logout, .nav-link {
            /* color: white; */
            color: rgba(212,155,32,1);
            font-family: 'Orbitron', sans-serif;
            border: 1px solid rgba(212,155,32,1);
            border-radius: 5px;
            padding: 5px 10px;
            text-decoration: none;
        }

        #logout:hover, .nav-link:hover, #home:hover , #search:hover, #friends:hover {
            background-color: rgba(212,155,32,1);
            color: black;
        }

        .navbar-brand {
            font-size: 1.2em;
            font-weight: bold;
        }

        .nav-link {
            font-size: 1.1em;
            margin: 0 10px;
        }

        .nav-link.active {
            color: rgba(212,155,32,1);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 15px;
        }

        .form-control-sm {
            background-color: rgba(60,56,53,255);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px;
        }

        .form-control-sm option {
            background-color: rgba(60,56,53,255);
            color: white;
        }

        body {
            background: rgba(40,40,40,255);
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>
    <nav id="navi" class="navbar navbar-light">
        <div class="container-fluid">
            <a class="nav-link navbar-brand" id="logout" href="#"><i class="fas fa-sign-out-alt"></i></a>
            <div class="mx-auto d-flex align-items-center">
                <a class="nav-link active" aria-current="page" id="home" href="#"><i class="fas fa-home"></i></a>
                <a class="nav-link active" aria-current="page" id="search" href="#"><i class="fas fa-search"></i></a>
                <a class="nav-link active" aria-current="page" id="friends" href="#"><i class="fas fa-user-friends"></i></a>
            </div>
            <div class="d-flex align-items-center">
                <select class="form-control form-control-sm mr-2" id="language-selector">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                </select>
                <img src="https://staticg.sportskeeda.com/editor/2022/06/508cd-16557590423635-1920.jpg?w=640" alt="Avatar" class="avatar">
            </div>
        </div>
    </nav>

    <div id="app"></div>
</body>
</html>
