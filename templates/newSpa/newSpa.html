/***********************profile view*******************************/


.user-profile {
    background-color: #2c2c2c;
    border: none;
    border-radius: 15px;
    max-width: 400px;
    overflow: hidden;
}

.card-header {
    background-color: rgba(212,155,32,0.6);
    padding: 20px;
}

.profile-avatar {
    width: 60px;
    height: 60px;

    object-fit: cover;
}

    margin: 0;
}

.follow-btn {
    margin-left: 10px;
}

.status-indicator {
    margin-left: 5px;
    width: 10px;

    border-radius: 50%;
    background-color: #28a745;
}

    background-color: #dc3545;
}

.status-text {
    font-weight: bold;
    color: #f8f9fa;
}

.stats {
    margin-top: 20px;
}

    text-align: center;
}

.stat h5 {
    margin-bottom: 5px;
    color: #adb5bd;
}

    /* margin-top: 20px; */
    max-height: 200px; /* Adjust height to limit the visible matches */
    overflow-y: auto;
}

{
    color:#FFF
}
.match {
    padding: 10px;
    border-bottom: 1px solid #343a40;
    background-color: #3a3a3a; /* Background color for each match */
    border-radius: 5px;
    margin-bottom: 10px;
    display: flex;
    flex-wrap: wrap;
    color: #c9ced2;
}

.match:last-child {
    border-bottom: none;
}

.player-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
}

.player-name {
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px; /* Adjust max-width as needed */
}

.vs {
    margin: 0 10px;
    font-weight: bold;
    color: #adb5bd;
    flex-shrink: 0;
}

.match-score {
    font-weight: bold;
    color: #f8f9fa;
    font-size: 1.2em;
    padding: 2px 5px;
    border: 1px solid #adb5bd;
    border-radius: 5px;
}

.match-date {
    font-size: 0.9em;
    color: #adb5bd;
    flex-shrink: 0;
}
