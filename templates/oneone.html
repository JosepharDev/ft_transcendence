        + '3'

    );

    let k = 0;
    let iamuser = 0;

            const data = JSON.parse(e.data);

      {
        iamuser = data.message.iam;
        drawText2("waiting...", canvas.width / 2, canvas.height / 2, "#FFF"); 

      }
    else if (data.message.action === 'finish')
    {
        alert (`${data.message.winner} WON`);
        pushUrl('/');
    }
    else if (data.message.action === 'data')
    {
        remoteGameLoop();
        drawBall(data.message.ball.pos.x, data.message.ball.pos.y, data.message.ball.radius);
        console.log("YOYOYYOOOOOOOOOOOOOOOOo")
        drawPaddle(
            data.message.paddle_1.pos.x,
            data.message.paddle_1.pos.y,

            data.message.paddle_2.pos.x,
            data.message.paddle_2.pos.y,
            data.message.paddle_2.width,
            data.message.paddle_2.height
        );
        drawSceneGame();
        drawText(data.message.paddle_1.score, canvas.width / 4, 50, "#FFF"); // Draw team1 score

        // remoteIncreaseScore(data.message.paddle_2.s, data.message.paddle_2.score);
    }
    else if (data.message.action === 'users')
    {
        document.getElementById("users").textContent = `${data.message.user1} vs ${data.message.user2}`;
        remoteGameLoop();
        drawText2("ready", canvas.width / 2, canvas.height / 2, "#FFF");

    function onKeyDownEvent(e)
    {
        if (e.keyCode != 38 && e.keyCode != 40)

function vec2(x, y)
{
  return {x: x, y : y};
}

function remoteIncreaseScore(player, score) {
  if (player === 2)
  {
    document.getElementById("player2").innerHTML = score;
  }
  if (player === 1)
  {
    document.getElementById("player1").innerHTML = score;
  }
}

function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "20px Arial";
            ctx.fillText(text, x, y);
        }
function drawText2(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "30px Arial";
            ctx.fillText(text, x-30, y);
        }

function remoteGameLoop()
{
  ctx.fillStyle = "rgba(0,0,0,1)"
  ctx.fillRect(0,0,canvas.width, canvas.height);
}

function drawBall(x, y, radius)
{
  ctx.fillStyle = "white";
  // ctx.strokeStyle =  "white";
  ctx.beginPath ();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  // ctx.stroke();
}

function drawPaddle(x, y, width, height)
{
  ctx.fillStyle  = "white";
  ctx.beginPath();

  ctx.fillRect(x, y, width, height);
