                data.message.pos.x,

              );
              drawPaddle(
                data.message.paddle_3.pos.x,
                data.message.paddle_3.pos.y,
                data.message.paddle_3.width,
                data.message.paddle_3.height
              );
              drawPaddle(
                data.message.paddle_4.pos.x,
                data.message.paddle_4.pos.y,
                data.message.paddle_4.width,
                data.message.paddle_4.height
              );
              drawSceneGame();
              increaseScore(data.message.paddle_1.s, data.message.paddle_1.score);
              increaseScore(data.message.paddle_4.s, data.message.paddle_4.score);
            }
            else if (data.message.action === 'users')
            {
                document.getElementById("player22").textContent = data.message.user2;
                document.getElementById("player11").textContent = data.message.user1;
                var loop = function (count) {
                  if (count > 0) {
                    document.getElementById("timer").textContent = count--;
                      timer = setTimeout(loop, 1000, count);
                  } else {
                      document.getElementById("timer").textContent = '';
                      clearTimeout(timer);
                  }
                }
            
                // start the countdown
                loop(4);
            }
        };

    function vec2(x, y)

    function increaseScore(player, score) {
      if (player === 2)
      {
        document.getElementById("player2").innerHTML = score;
      }
      if (player === 1)
      {
        document.getElementById("player1").innerHTML = score;
      }
    }

    function drawSceneGame()
    {
      ctx.strokeStyle = "#49243E";

      ctx.beginPath();
      ctx.lineWidth = 20;
      ctx.moveTo(0,0);
      ctx.lineTo(canvas.width, 0 );
      ctx.stroke();


      ctx.beginPath();
      ctx.lineWidth = 20;
      ctx.moveTo(0,canvas.height);
      ctx.lineTo(canvas.width, canvas.height );
      ctx.stroke();
      // eUpdate();
      // gameDraw();
    
      ctx.beginPath();
      ctx.lineWidth = 10;
      ctx.moveTo(canvas.width,0);
      ctx.lineTo(canvas.width, canvas.height );
      ctx.stroke();

      ctx.beginPath();
      ctx.lineWidth = 10;
      ctx.moveTo(0, 0);
      ctx.lineTo(0, canvas.height );
      ctx.stroke();

      ctx.beginPath();
      ctx.lineWidth = 10;
      ctx.moveTo(canvas.width/2, 0);
      ctx.lineTo(canvas.width/2, canvas.height );
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(canvas.width/2, canvas.height / 2, 50, 0, Math.PI * 2);
      ctx.lineWidth = 5;
      ctx.stroke();

    }

    function drawBall(x, y, radius)
    {
      ctx.fillStyle = "#33ff00";
      ctx.strokeStyle =  "#33ff00";
      ctx.beginPath ();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    function drawPaddle(x, y, width, height)
    {
      console.log(`y = ${y}`);
      /*ctx.fillRect (x, y, width, height);*/
      
      
      ctx.fillStyle  = "#BB8493";
      /*ctx.strokeStyle = "blue";*/
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, [70]);
      ctx.fill();
    }
