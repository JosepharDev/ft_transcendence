<svg width="1400" height="720" viewBox="0 0 1400 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ft_transcendence architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1400" height="720" rx="20" fill="#0f172a"/>
  <text x="40" y="52" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700">System Architecture</text>

  <rect x="40" y="90" width="1320" height="590" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>

  <rect x="80" y="150" width="270" height="130" rx="12" fill="#1e3a8a"/>
  <text x="102" y="193" fill="#e2e8f0" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Browser SPA</text>
  <text x="102" y="218" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Static JS app + game UI</text>

  <rect x="420" y="130" width="300" height="170" rx="12" fill="#0f766e"/>
  <text x="444" y="173" fill="#e2e8f0" font-size="26" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">NGINX</text>
  <text x="444" y="201" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">TLS endpoint :443</text>
  <text x="444" y="225" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Serves frontend static files</text>
  <text x="444" y="249" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Proxies /api and /ws to backend</text>

  <rect x="800" y="120" width="360" height="190" rx="12" fill="#6d28d9"/>
  <text x="824" y="163" fill="#e2e8f0" font-size="26" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Django + Channels</text>
  <text x="824" y="191" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">REST APIs (auth/profile/friends/search)</text>
  <text x="824" y="215" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">OAuth42 + JWT + 2FA</text>
  <text x="824" y="239" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">WebSocket game consumers</text>
  <text x="824" y="263" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Daphne ASGI over HTTPS</text>

  <rect x="800" y="390" width="300" height="150" rx="12" fill="#7c2d12"/>
  <text x="824" y="432" fill="#e2e8f0" font-size="26" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">PostgreSQL</text>
  <text x="824" y="460" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Users, profiles, game data</text>
  <text x="824" y="484" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Persistent Docker volume</text>

  <rect x="420" y="420" width="300" height="120" rx="12" fill="#334155"/>
  <text x="444" y="462" fill="#e2e8f0" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Media Volume</text>
  <text x="444" y="488" fill="#cbd5e1" font-size="15" font-family="Inter,Segoe UI,Arial,sans-serif">Shared between backend/server</text>

  <line x1="350" y1="215" x2="420" y2="215" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="720" y1="200" x2="800" y2="200" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="980" y1="310" x2="980" y2="390" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="300" x2="570" y2="420" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="80" y="618" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Public entrypoint: https://localhost:8000 (mapped to NGINX :443). NGINX forwards API + WebSocket traffic to Django Channels.</text>
</svg>
