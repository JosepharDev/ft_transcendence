  <template id="profile_template">
    <div class="information">
      <div class="head-profile">
        <div class="container">
          <div class="user">
            <img src="asset/aahrach.jpeg" alt="avatar">
            <div class="online"></div>
            <h3>aahrach</h3>
          </div>
          <button>
            Follow
          </button>
        </div>
      </div>
      <div class="results">
        <div class="win-rate">
          <h4>Win Rate</h4>
          <div class="number">80</div>
        </div>
        <div class="total-win">
          <h4>Total Win</h4>
          <div class="number">20</div>
        </div>
        <div class="best-time">
          <h4>Best Time</h4>
          <div class="number">180</div>
        </div>
      </div>
      <div class="latest-games">
        <div class="container">
          <div class="number-games">
            <h2>Latest Games</h2>
            <h2>300</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Result</th>
                <th>Opponent</th>
                <th>Rank</th>
                <th></th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>VICTORY</td>
                <td>
                  <img src="asset/yoyahya.jpeg" alt="image">
                  <h4>yoyahya</h4>
                </td>
                <td>#12</td>
                <td><i class='bx bxs-up-arrow' style='color:#00f635'></i></td>
                <td>51*</td>
              </tr>
              <tr>
                <td>DEFEAT</td>
                <td>
                  <img src="asset/zlazrak.jpeg" alt="image">
                  <h4>zlazrak</h4>
                </td>
                <td>#22</td>
                <td><i class='bx bxs-down-arrow' style='color:#f60004'></i></td>
                <td>302*</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="friends">
      <div class="container">
        <div class="number-friends">
          <h2>Friends</h2>
          <h2>10</h2>
        </div>
        <ul>
          <li>
            <div>
              <img src="./asset/yoyahya.jpeg" alt="friend image">
              <h4>yoyahya</h4>
            </div>
            <button>
              Follow
            </button>
          </li>
          <li>
            <div>
              <img src="./asset/zlazrak.jpeg" alt="friend image">
              <h4>zlazrak</h4>
            </div>
            <button>
              Follow
            </button>
          </li>
        </ul>
      </div>
    </div>
  </template>
  
  <template id="settings_template">
    <div class="profile">
      <h2>My account</h2>
      <div class="profile-header">
        <div class="profile-image">
          <button>
            <i class='bx bxs-pencil' style='color:#faf9f9'></i>
          </button>
          <img src="asset/aahrach.jpeg" alt="Profile Image">
        </div>
        <div class="title">
          <h1 class="Username">aahrach</h1>
          <button class="see-profile">See Public Profile</button>
        </div>
      </div>
    </div>
    <div class="main-profile">
      <div class="information">
        <div class="container">
          <div class="Username">
            <div>
              <h3>USERNAME</h3>
              <h4>aahrach</h4>
            </div>
            <button>Edit</button>
          </div>
          <div class="nickname">
            <div>
              <h3>NICKNAME</h3>
              <h4>nickname</h4>
            </div>
            <button>Edit</button>
          </div>
          <div class="email">
            <div>
              <h3>EMAIL</h3>
              <h4>achrafahrach44@gmail.com</h4>
            </div>
            <button>Edit</button>
          </div>
          <div class="phone-number">
            <div>
              <h3>PHONE NUMBER</h3>
              <h4>0628224327</h4>
            </div>
            <button>Edit</button>
          </div>
          <div class="two-factor">
            <h4>Two Factor authentication enabled</h4>
            <button>Remove 2FA</button>
          </div>
        </div>
      </div>
      <div class="friends">
        <h2>FRIENDS</h2>
        <ul>
          <li>
            <div>
              <img src="./asset/yoyahya.jpeg" alt="Profile image">
              <h4>yoyahya</h4>
            </div>
            <button>Show Profile</button>
          </li>
        </ul>
      </div>
    </div>
  </template>
  
  <template id="remove-two-factor">
    <div class="remove-two-factor">
      <h4>2FA</h4>
      <img src="/asset/qr-code.png" alt="image qr code">
      <label for="six-digit-number">Enter the 6-Digit Code:</label>
      <input type="text" id="six-digit-number" name="six-digit-number" pattern="\d{6}" maxlength="6" required title="Please enter exactly 6 digits">
      <div class="buttons">
        <button class="submit">Done</button>
        <button class="cancel">Cancel</button>
      </div>
    </div>
  </template>
  
  <template id="edit-my-acount">
    <div class="edit-my-acount">
      <h4>Edit your ....</h4>
      <input type="text" maxlength="12" required>
      <div class="buttons">
        <button class="submit">Done</button>
      <button class="cancel">Cancel</button>
      </div>
    </div>
  </template>

  <template id="change-image">
    <div class="change-image">
      <h4>Edit your picture</h4>
      <input type="file" required>
      <div class="buttons">
        <button class="submit">SUBMIT</button>
        <button class="cancel">CANCEL</button>
      </div>
    </div>
  </template>
  
  <template id="nav-bar_template">
    <button class="settings"><i class='bx bxs-user-circle' ></i></button>
    <div class="container">
      <button class="home"><i class='bx bxs-home' ></i></button>
      <button class="search"><i class='bx bx-male-female'></i></button>
      <button class="language"><i class='bx bxs-bar-chart-alt-2'></i></button>
      <button class="play"><i class='bx bxs-joystick' ></i></button>
      <button class="exit"><i class='bx bx-exit bx-flip-vertical' ></i></button>
    </div>
  </template>

  <template id="login_template">
    <div class="container">
      <form action="">
        <h1>Login</h1>
        <div class="input-box">
          <input type="text" placeholder="Username" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required>
          <i class='bx bxs-lock-alt' ></i>
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox"> remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="register-link">
          <p>Don't have an account? <a href="#">Register</a></p>
        </div>
      </form>
    </div>
  </template>

  <template id="home_template">
    <div class="container">
      <div class="tournament">
        <div class="overlay">
          <div class="text">Tournament</div>
          <button>GO</button>
        </div>
      </div>
      <div class="oneVSone-local">
        <div class="overlay">
          <div class="text">1vs1 local</div>
          <button>GO</button>
        </div>
      </div>
      <div class="oneVSone-remote">
        <div class="overlay">
          <div class="text">1vs1 remote</div>
          <button>GO</button>
        </div>
      </div>
      <div class="oneVSone-bot">
        <div class="overlay">
          <div class="text">1vs1 bot</div>
          <button>GO</button>
        </div>
      </div>
      <div class="twoVStwo-remote">
        <div class="overlay">
          <div class="text">2vs2 remote</div>
          <button>GO</button>
        </div>
      </div>
    </div>
  </template>
